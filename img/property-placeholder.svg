<svg xmlns="http://www.w3.org/2000/svg" width="740" height="416" viewBox="0 0 740 416">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3f4f6"/>
      <stop offset="1" stop-color="#e5e7eb"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c7e7ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <rect width="740" height="416" fill="url(#g)"/>
  <rect x="0" y="0" width="740" height="220" fill="url(#sky)"/>

  <!-- ground -->
  <rect x="0" y="240" width="740" height="176" fill="#d1d5db" opacity="0.55"/>

  <!-- house -->
  <g transform="translate(165,105)">
    <!-- roof -->
    <path d="M205 0 L410 120 L0 120 Z" fill="#111827" opacity="0.9"/>
    <!-- body -->
    <rect x="40" y="120" width="330" height="220" rx="10" fill="#ffffff"/>
    <!-- door -->
    <rect x="185" y="215" width="60" height="125" rx="8" fill="#111827" opacity="0.9"/>
    <circle cx="232" cy="278" r="4" fill="#ffffff" opacity="0.9"/>
    <!-- windows -->
    <rect x="80" y="170" width="70" height="55" rx="6" fill="#e5e7eb" stroke="#cbd5e1"/>
    <rect x="260" y="170" width="70" height="55" rx="6" fill="#e5e7eb" stroke="#cbd5e1"/>
    <rect x="80" y="245" width="70" height="55" rx="6" fill="#e5e7eb" stroke="#cbd5e1"/>
    <rect x="260" y="245" width="70" height="55" rx="6" fill="#e5e7eb" stroke="#cbd5e1"/>
  </g>

  <!-- label -->
  <g>
    <rect x="24" y="24" width="260" height="44" rx="10" fill="#ffffff" opacity="0.9"/>
    <text x="44" y="53" font-family="Arial, sans-serif" font-size="18" fill="#111827">Imagen no disponible</text>
  </g>
</svg>
